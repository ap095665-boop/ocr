<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fluid Neon Blob</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}
canvas {
  display: block;
}
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 2;

let renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// GEOMETRY (blob)
let geometry = new THREE.SphereGeometry(0.8, 128, 128);

// SHADER MATERIAL (neon + fluid)
let material = new THREE.ShaderMaterial({
  uniforms: {
    time: { value: 0 },
    touch: { value: new THREE.Vector2(0, 0) }
  },

  vertexShader: `
    uniform float time;
    uniform vec2 touch;
    varying vec2 vUv;

    void main() {
      vUv = uv;

      vec3 pos = position;

      float dist = distance(uv, touch);

      // organic wave
      pos += normal * sin(time * 2.0 + pos.y * 5.0) * 0.08;

      // touch distortion
      pos += normal * (0.3 / (dist + 0.1));

      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
  `,

  fragmentShader: `
    varying vec2 vUv;
    uniform float time;

    void main() {
      vec3 color;

      // neon gradient
      color.r = 0.5 + 0.5 * sin(time + vUv.x * 6.0);
      color.g = 0.5 + 0.5 * sin(time + vUv.y * 6.0);
      color.b = 0.8 + 0.5 * sin(time);

      gl_FragColor = vec4(color, 1.0);
    }
  `
});

let blob = new THREE.Mesh(geometry, material);
scene.add(blob);

// TOUCH / MOUSE
function updateTouch(x, y) {
  material.uniforms.touch.value.set(x, y);
}

window.addEventListener("mousemove", (e) => {
  updateTouch(e.clientX / window.innerWidth, 1 - e.clientY / window.innerHeight);
});

window.addEventListener("touchmove", (e) => {
  let t = e.touches[0];
  updateTouch(t.clientX / window.innerWidth, 1 - t.clientY / window.innerHeight);
});

// ANIMATION
function animate() {
  requestAnimationFrame(animate);

  material.uniforms.time.value += 0.03;
  blob.rotation.y += 0.005;

  renderer.render(scene, camera);
}

animate();

// RESPONSIVE
window.addEventListener("resize", () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
