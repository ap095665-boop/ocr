<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Accurate OCR</title>

<style>
body {
  background:#0f0f0f;
  color:white;
  text-align:center;
  font-family:Arial;
  padding:20px;
}
canvas {
  max-width:320px;
  margin-top:10px;
}
#output {
  margin-top:20px;
  background:#1f1f1f;
  padding:15px;
  border-radius:10px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<h2>🔥 High Accuracy OCR (Black Text Mode)</h2>

<input type="file" id="imageInput" accept="image/*"><br>
<canvas id="canvas"></canvas><br>
<button onclick="runOCR()">Extract Text</button>

<div id="output">Result will appear here...</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let ready = false;

// Load image
document.getElementById("imageInput").addEventListener("change", e => {
  const file = e.target.files[0];
  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = () => {

    // 🔥 Strong zoom (3x)
    canvas.width = img.width * 3;
    canvas.height = img.height * 3;

    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    ready = true;
  };
});

function runOCR() {
  if (!ready) {
    alert("Upload image first!");
    return;
  }

  let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let data = imgData.data;

  // 🔥 Advanced preprocessing
  for (let i = 0; i < data.length; i += 4) {

    let r = data[i];
    let g = data[i + 1];
    let b = data[i + 2];

    // Convert to grayscale
    let gray = 0.299*r + 0.587*g + 0.114*b;

    // 🔥 Hard threshold → PURE BLACK or WHITE
    if (gray < 140) {
      data[i] = data[i+1] = data[i+2] = 0;   // BLACK TEXT
    } else {
      data[i] = data[i+1] = data[i+2] = 255; // WHITE BG
    }
  }

  ctx.putImageData(imgData, 0, 0);

  document.getElementById("output").innerText = "Processing... ⏳";

  Tesseract.recognize(
    canvas,
    'eng',
    {
      tessedit_pageseg_mode: 6,
      preserve_interword_spaces: 1
    }
  ).then(({ data: { text } }) => {

    let clean = text
      .replace(/[^\x20-\x7E\n]/g, "")
      .replace(/\s+/g, " ")
      .trim();

    document.getElementById("output").innerText =
      clean || "No text detected";

  }).catch(err => {
    document.getElementById("output").innerText = "Error: " + err;
  });
}
</script>

</body>
</html>
