<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Art Generator</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: Arial, sans-serif;
    }

    canvas {
        display: block;
    }

    .controls {
        position: fixed;
        bottom: 20px;
        width: 100%;
        text-align: center;
        z-index: 10;
    }

    button {
        padding: 10px 20px;
        margin: 5px;
        border: none;
        border-radius: 20px;
        background: rgba(255,255,255,0.1);
        color: white;
        backdrop-filter: blur(10px);
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: rgba(255,255,255,0.3);
    }
</style>
</head>
<body>

<canvas id="artCanvas"></canvas>

<div class="controls">
    <button onclick="generateArt()">🎨 New Art</button>
    <button onclick="saveImage()">💾 Save Wallpaper</button>
</div>

<script>
const canvas = document.getElementById("artCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let particles = [];

function randomColor() {
    return `hsl(${Math.random()*360}, 100%, ${50 + Math.random()*30}%)`;
}

function generateArt() {
    particles = [];
    let count = 150;

    for (let i = 0; i < count; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 3 + 1,
            speedX: (Math.random() - 0.5) * 2,
            speedY: (Math.random() - 0.5) * 2,
            color: randomColor()
        });
    }
}

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.08)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();

        p.x += p.speedX;
        p.y += p.speedY;

        if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
        if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
    });

    connectParticles();
    requestAnimationFrame(draw);
}

function connectParticles() {
    for (let a = 0; a < particles.length; a++) {
        for (let b = a; b < particles.length; b++) {
            let dx = particles[a].x - particles[b].x;
            let dy = particles[a].y - particles[b].y;
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 120) {
                ctx.strokeStyle = particles[a].color;
                ctx.lineWidth = 0.3;
                ctx.beginPath();
                ctx.moveTo(particles[a].x, particles[a].y);
                ctx.lineTo(particles[b].x, particles[b].y);
                ctx.stroke();
            }
        }
    }
}

function saveImage() {
    let link = document.createElement("a");
    link.download = "art-wallpaper.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}

canvas.addEventListener("click", generateArt);

generateArt();
draw();
</script>

</body>
</html>
