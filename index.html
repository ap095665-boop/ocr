<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Style Generator</title>

<style>
body {
    background: #111;
    color: #fff;
    text-align: center;
    font-family: Arial;
}

canvas {
    max-width: 100%;
    margin-top: 20px;
    border-radius: 10px;
}

button {
    margin: 10px;
    padding: 10px 15px;
    border: none;
    background: #00ffcc;
    cursor: pointer;
    border-radius: 5px;
}
</style>
</head>

<body>

<h2>🎨 Image Style Generator</h2>

<input type="file" id="upload"><br>

<button onclick="applySketch()">Sketch</button>
<button onclick="applyCartoon()">Cartoon</button>
<button onclick="applyOil()">Oil Paint</button>

<br>
<canvas id="canvas"></canvas>

<script>
let img = new Image();

document.getElementById("upload").addEventListener("change", function(e) {
    let reader = new FileReader();
    reader.onload = function(event) {
        img.src = event.target.result;
    }
    reader.readAsDataURL(e.target.files[0]);
});

function drawBase() {
    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);
    return ctx;
}

// ✏️ SKETCH EFFECT
function applySketch() {
    let ctx = drawBase();
    let canvas = ctx.canvas;

    let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let data = imageData.data;

    // grayscale + edge detection
    for (let i = 0; i < data.length; i += 4) {
        let gray = (data[i] + data[i+1] + data[i+2]) / 3;
        data[i] = data[i+1] = data[i+2] = gray;
    }

    // invert
    for (let i = 0; i < data.length; i += 4) {
        data[i] = 255 - data[i];
        data[i+1] = 255 - data[i+1];
        data[i+2] = 255 - data[i+2];
    }

    ctx.putImageData(imageData, 0, 0);
}

// 🎭 CARTOON EFFECT
function applyCartoon() {
    let ctx = drawBase();
    let canvas = ctx.canvas;

    let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let data = imageData.data;

    for (let i = 0; i < data.length; i += 4) {
        // reduce colors (posterization)
        data[i] = Math.floor(data[i] / 64) * 64;
        data[i+1] = Math.floor(data[i+1] / 64) * 64;
        data[i+2] = Math.floor(data[i+2] / 64) * 64;
    }

    ctx.putImageData(imageData, 0, 0);
}

// 🖌 OIL PAINT EFFECT
function applyOil() {
    let ctx = drawBase();
    let canvas = ctx.canvas;

    let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let data = imageData.data;
    let width = canvas.width;

    let radius = 2;

    let copy = new Uint8ClampedArray(data);

    for (let y = radius; y < canvas.height - radius; y++) {
        for (let x = radius; x < canvas.width - radius; x++) {

            let r = 0, g = 0, b = 0, count = 0;

            for (let dy = -radius; dy <= radius; dy++) {
                for (let dx = -radius; dx <= radius; dx++) {
                    let i = ((y + dy) * width + (x + dx)) * 4;
                    r += copy[i];
                    g += copy[i+1];
                    b += copy[i+2];
                    count++;
                }
            }

            let i = (y * width + x) * 4;
            data[i] = r / count;
            data[i+1] = g / count;
            data[i+2] = b / count;
        }
    }

    ctx.putImageData(imageData, 0, 0);
}
</script>

</body>
</html>
